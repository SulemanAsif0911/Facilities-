<!-- ============================================================
  CYBER HAYAT PK — Live AI Chatbot
  DROP-IN REPLACEMENT for the chatbot section in features.html

  STEP 1: Replace the entire <section id="chatbot"> block with this
  STEP 2: Add the chatbot JS from chatbot-script-addition.js into your script.js
  STEP 3: Get your API key (see CHATBOT_SETUP_GUIDE below)
  ============================================================ -->

<section class="band dark-band" id="chatbot" aria-labelledby="chatbot-title">
  <div class="container tool-layout">
    <div>
      <p class="section-kicker">Live AI Help</p>
      <h2 id="chatbot-title">AI Support Chatbot</h2>
      <p class="feature-note">
        Powered by Claude AI. Describe your situation in English or Urdu.
        Do not share your CNIC, full name, or home address.
        For emergencies call <a href="tel:1043" style="color:var(--cyan-soft)">1043</a> or <a href="tel:15" style="color:var(--cyan-soft)">15</a>.
      </p>
    </div>

    <div class="tool-panel">

      <!-- Chat window -->
      <div id="chatWindow" class="chat-window" role="log" aria-live="polite" aria-label="Chat messages"
           style="display:flex;flex-direction:column;gap:0.9rem;min-height:340px;max-height:420px;overflow-y:auto;scroll-behavior:smooth">
      </div>

      <!-- Quick chip buttons -->
      <div class="chat-options" id="chipsBar" aria-label="Quick topic buttons" style="margin-top:0.75rem">
        <button class="chip-button" type="button" onclick="chatChip(this,'I am being blackmailed online')">Being blackmailed</button>
        <button class="chip-button" type="button" onclick="chatChip(this,'Someone made a fake account of me')">Fake account</button>
        <button class="chip-button" type="button" onclick="chatChip(this,'I am being stalked online')">Online stalking</button>
        <button class="chip-button" type="button" onclick="chatChip(this,'My private information was shared without my consent')">Info leaked</button>
        <button class="chip-button" type="button" onclick="chatChip(this,'I feel unsafe right now and need urgent help')">I feel unsafe ⚠</button>
        <button class="chip-button" type="button" onclick="chatChip(this,'What are my legal rights under PECA 2016?')">My legal rights</button>
      </div>

      <!-- Input bar -->
      <div style="display:flex;gap:8px;align-items:flex-end;margin-top:0.75rem">
        <textarea
          id="chatInput"
          class="chat-input-field"
          placeholder="Type your situation in English or Urdu…"
          rows="1"
          aria-label="Type your message"
          style="flex:1;background:rgba(3,8,20,0.8);border:1px solid rgba(34,246,255,0.2);border-radius:8px;color:var(--text);font-size:14px;padding:10px 14px;resize:none;min-height:42px;max-height:120px;line-height:1.5;font-family:inherit;overflow-y:auto"
        ></textarea>
        <button
          id="chatSendBtn"
          type="button"
          onclick="chatSend()"
          aria-label="Send message"
          style="width:42px;height:42px;border-radius:8px;background:rgba(34,246,255,0.15);border:1px solid rgba(34,246,255,0.22);color:var(--cyan);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s"
        >&#9654;</button>
      </div>

      <!-- Status line -->
      <p id="chatStatus" style="font-size:12px;color:var(--muted);margin-top:6px;min-height:16px"></p>

    </div>
  </div>
</section>


<!-- ============================================================
  ADD THIS CSS to your styles.css (paste at the bottom)
  ============================================================

.message {
  max-width: 86%;
  padding: 0.85rem 1rem;
  border-radius: 8px;
  line-height: 1.6;
  font-size: 14px;
  animation: msg-fadein .2s ease;
}
@keyframes msg-fadein {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: none; }
}
.message.assistant {
  align-self: flex-start;
  border: 1px solid rgba(34,246,255,0.22);
  background: rgba(34,246,255,0.08);
  color: var(--cyan-soft);
}
.message.user {
  align-self: flex-end;
  border: 1px solid rgba(255,48,72,0.28);
  background: rgba(255,48,72,0.12);
  color: var(--text);
}
.message.thinking {
  align-self: flex-start;
  border: 1px solid rgba(34,246,255,0.22);
  background: rgba(34,246,255,0.08);
}
.dots span {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--cyan);
  margin-right: 3px;
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dot-bounce {
  0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
  40%         { transform: scale(1);   opacity: 1;   }
}

============================================================ -->
